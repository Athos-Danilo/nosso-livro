<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Lado Esquerdo do Livro (Branco e ampliado para ocupar todo o espaço útil) -->
  <path d="M 240,430 C 150,390 80,390 32,430 L 32,100 C 80,60 150,60 240,100 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="48" 
        stroke-linejoin="round" 
        stroke-linecap="round" />

  <!-- Lado Direito do Livro (Branco e ampliado para ocupar todo o espaço útil) -->
  <path d="M 240,430 C 150,390 80,390 32,430 L 32,100 C 80,60 150,60 240,100 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="48" 
        stroke-linejoin="round" 
        stroke-linecap="round" 
        transform="translate(512, 0) scale(-1, 1)" />

  <!-- Fita Marcadora Central (Branco sólido expandido) -->
  <path d="M 240,60 H 272 V 330 L 256,360 L 240,330 Z" 
        fill="#ffffff" 
        stroke="#ffffff"
        stroke-width="12"
        stroke-linejoin="round" 
        stroke-linecap="round" />
</svg>